name: Publish pi-packages

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'packages/pi-*/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'Specific package to publish (optional)'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure git
        run: |
          git config --global user.name "0xKobold Bot"
          git config --global user.email "bot@0xkobold.ai"

      - name: Detect changed packages
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.package }}" ]; then
            echo "package=${{ github.event.inputs.package }}" >> $GITHUB_OUTPUT
            echo "mode=single" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get list of changed packages
          CHANGED=$(git diff --name-only HEAD~1 packages/ 2>/dev/null | cut -d/ -f2 | sort -u | grep "^pi-" | tr '\n' ',' | sed 's/,$//')
          echo "package=$CHANGED" >> $GITHUB_OUTPUT
          echo "mode=all" >> $GITHUB_OUTPUT
          echo "Packages with changes: $CHANGED"

      - name: Setup npm credentials
        if: env.NPM_TOKEN != ''
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish each package
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PACKAGES="${{ steps.changed.outputs.package }}"
          [ -z "$PACKAGES" ] && echo "No packages to publish" && exit 0
          
          for PKG in $(echo "$PACKAGES" | tr ',' ' '); do
            PKG_DIR="packages/$PKG"
            
            if [ ! -d "$PKG_DIR" ]; then
              echo "⚠️ Directory $PKG_DIR not found, skipping"
              continue
            fi
            
            # Check if package has pi-package keyword
            if ! grep -q '"pi-package"' "$PKG_DIR/package.json" 2>/dev/null; then
              echo "⏭️ $PKG has no pi-package keyword, skipping"
              continue
            fi
            
            echo "=========================================="
            echo "Publishing: $PKG"
            echo "=========================================="
            
            PKG_REMOTE="git@github.com:0xKobold/$PKG.git"
            
            # Install dependencies and build
            cd "$PKG_DIR"
            bun install --frozen-lockfile 2>/dev/null || bun install
            bun run build 2>&1 || { echo "❌ Build failed"; exit 1; }
            cd - > /dev/null
            
            # === Push to individual repo using subtree ===
            
            # Add remote if not exists
            if ! git remote | grep -q "^pkg-$PKG$"; then
              git remote add "pkg-$PKG" "$PKG_REMOTE"
            fi
            
            # Fetch existing remote history
            git fetch "pkg-$PKG" main --quiet 2>/dev/null || {
              echo "Creating new main branch for $PKG..."
            }
            
            # Use subtree split to extract package commits
            # Then push to individual repo
            echo "Extracting $PKG history..."
            SPLIT_HASH=$(git subtree split --prefix="$PKG_DIR" -b "split-$PKG" 2>/dev/null | tail -1)
            
            if [ -n "$SPLIT_HASH" ]; then
              echo "Pushing to $PKG individual repo..."
              git push "pkg-$PKG" "split-$PKG:main" --force 2>&1 || echo "⚠️ Push to $PKG failed"
              git branch -d "split-$PKG" 2>/dev/null || true
            else
              echo "⚠️ Subtree split failed, trying direct push..."
              # Fallback: just push the directory content
              (cd "$PKG_DIR" && git init && git add . && git commit -m "Sync from monorepo")
              git push "pkg-$PKG" main --force 2>&1 || echo "⚠️ Direct push also failed"
            fi
            
            # === Publish to npm ===
            if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
              echo "Publishing to npm..."
              cd "$PKG_DIR"
              npm publish --access public 2>&1 || echo "⚠️ npm publish failed (version may already exist)"
              cd - > /dev/null
            fi
            
            echo "✅ $PKG complete"
            echo ""
          done

      - name: Summary
        run: |
          echo "## Publish Summary"
          echo "| Item | Value |"
          echo "|------|-------|"
          echo "| Trigger | ${{ github.event_name }} |"
          echo "| Packages | ${{ steps.changed.outputs.package }} |"
          echo "| Mode | ${{ steps.changed.outputs.mode }} |"
