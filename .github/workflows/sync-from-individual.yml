name: Sync to Monorepo

on:
  schedule:
    # Run every hour to catch changes from individual repos
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      package:
        description: 'Specific package to sync (optional)'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}  # Need PAT with repo access

      - name: Configure git
        run: |
          git config --global user.name "0xKobold Bot"
          git config --global user.email "bot@0xkobold.ai"

      - name: Sync packages
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          
          # List of all pi-packages
          PACKAGES=(
            "pi-bridge"
            "pi-cloudflare-browser"
            "pi-erc8004"
            "pi-gateway"
            "pi-gateway-v2"
            "pi-learn"
            "pi-obsidian-bridge"
            "pi-ollama"
            "pi-suggest"
            "pi-wallet"
          )
          
          SYNC_PACKAGES=()
          if [ -n "$PACKAGE" ]; then
            SYNC_PACKAGES=("$PACKAGE")
          else
            SYNC_PACKAGES=("${PACKAGES[@]}")
          fi
          
          for PKG in "${SYNC_PACKAGES[@]}"; do
            echo "=========================================="
            echo "Checking: $PKG"
            echo "=========================================="
            
            PKG_DIR="packages/$PKG"
            PKG_REMOTE="git@github.com:0xKobold/$PKG.git"
            
            if [ ! -d "$PKG_DIR" ]; then
              echo "⚠️ $PKG_DIR not found, skipping"
              continue
            fi
            
            # Add remote if not exists
            if ! git remote | grep -q "^pkg-$PKG$"; then
              git remote add "pkg-$PKG" "$PKG_REMOTE" 2>/dev/null || {
                echo "⚠️ Could not add remote for $PKG"
                continue
              }
            fi
            
            # Fetch latest
            git fetch "pkg-$PKG" main --quiet 2>/dev/null || {
              echo "⚠️ Could not fetch $PKG"
              continue
            }
            
            # Get commits unique to the individual repo
            LOCAL_MAIN="origin/main"
            REMOTE_MAIN="pkg-$PKG/main"
            
            # Find commits in remote not in local
            MISSING_COMMITS=$(git log "$LOCAL_MAIN..$REMOTE_MAIN" --oneline 2>/dev/null | wc -l)
            
            if [ "$MISSING_COMMITS" = "0" ]; then
              echo "✅ $PKG is up to date"
              continue
            fi
            
            echo "📦 Found $MISSING_COMMITS commits in $PKG not in monorepo"
            git log "$LOCAL_MAIN..$REMOTE_MAIN" --oneline | head -10
            
            # Create a sync commit using subtree merge
            git subtree pull \
              --prefix="$PKG_DIR" \
              "pkg-$PKG" \
              main \
              --squash \
              -m "sync: pull $PKG changes from individual repo" \
              2>&1 || {
              echo "⚠️ Subtree pull failed, creating PR instead"
              
              # Create a branch for the sync
              git checkout -b "sync/$PKG-$(date +%Y%m%d)" 2>/dev/null || true
              
              # Cherry-pick commits
              git cherry-pick "$LOCAL_MAIN..$REMOTE_MAIN" 2>/dev/null || {
                echo "⚠️ Cherry-pick failed, will create PR with direct merge"
                git reset --hard "$LOCAL_MAIN"
              }
              
              # Push branch
              git push -u "pkg-$PKG" "sync/$PKG-$(date +%Y%m%d)" 2>/dev/null || true
              git checkout main
              git reset --hard HEAD
            }
            
            echo "✅ $PKG sync attempted"
            echo ""
          done

      - name: Create sync PR if changes
        if: github.event.inputs.package == ''
        run: |
          if git diff --stat origin/main | grep -q "packages/pi-"; then
            BRANCH="sync-packages-$(date +%Y%m%d-%H%M)"
            
            git checkout -b "$BRANCH"
            git add packages/pi-*/ || true
            git commit -m "chore: sync packages from individual repos

            Sync triggered by scheduled workflow
            Timestamp: $(date -u)"
            
            git push -u origin "$BRANCH" 2>&1
            
            # Create PR
            gh pr create \
              --title "Sync: Pull updates from individual package repos" \
              --body "Automated sync PR from hourly scheduled workflow.

Changes from individual repos (pi-bridge, pi-ollama, etc.) pulled into monorepo.

Please review and merge." \
              --base main 2>&1 || echo "PR creation skipped (may already exist or no changes)"
            
            git checkout main
          fi
